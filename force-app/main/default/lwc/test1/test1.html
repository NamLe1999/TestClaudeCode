<template>
    <div class="careers-page">

        <!-- Hero Section -->
        <div class="hero" style={heroStyle}>
            <div class="hero-overlay"></div>
            <div class="hero-text">
                <p>DAEUnextier is looking for talents</p>
                <p>who will build the future with us.</p>
            </div>
        </div>

        <!-- Tagline Section -->
        <div class="tagline">
            <div class="tagline-left">
                <p>We seek creative individuals</p>
                <p>who enjoy their work with passion,<br/>take ownership, and continuously challenge themselves.</p>
            </div>
            <div class="tagline-right">
                <p>If this sounds like you,</p>
                <p class="tagline-blue">you are exactly who we are looking for.</p>
            </div>
        </div>

        <!-- Qualities Section -->
        <div class="qualities">
            <!-- Row 1: Card1 | Card2 | [Sphere + Card3] (gap-20px) -->
            <div class="qualities-row qualities-row--gap20">
                <div class="quality-card quality-card--blue">
                    <img src={ellipse1Url} alt="" class="ellipse ellipse--1" />
                    <div class="quality-content">
                        <p class="quality-num">1.</p>
                        <p class="quality-text">Customer-focused mindset</p>
                    </div>
                </div>
                <div class="quality-card">
                    <img src={ellipse2Url} alt="" class="ellipse ellipse--2" />
                    <div class="quality-content">
                        <p class="quality-num">2.</p>
                        <p class="quality-text">Values integrity and principles</p>
                    </div>
                </div>
                <!-- Sphere + Card3 grouped with gap-85px -->
                <div class="quality-group quality-group--gap85">
                    <div class="quality-sphere">
                        <img src={ellipse4Url} alt="" class="sphere-img" />
                    </div>
                    <div class="quality-card">
                        <img src={ellipse3Url} alt="" class="ellipse ellipse--3" />
                        <div class="quality-content">
                            <p class="quality-num">3.</p>
                            <div class="quality-text">
                                <p>Thinks</p>
                                <p>innovatively</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 2: [Card4 + Sphere] | Card5-wide (gap-85px) -->
            <div class="qualities-row qualities-row--gap85">
                <!-- Card4 + Sphere grouped with gap-20px -->
                <div class="quality-group quality-group--gap20">
                    <div class="quality-card">
                        <img src={ellipse3Url} alt="" class="ellipse ellipse--4" />
                        <div class="quality-content">
                            <p class="quality-num">4.</p>
                            <p class="quality-text">Passionate about their work</p>
                        </div>
                    </div>
                    <div class="quality-sphere">
                        <img src={ellipse4Url} alt="" class="sphere-img" />
                    </div>
                </div>
                <!-- Card5 wide -->
                <div class="quality-card quality-card--wide quality-card--blue">
                    <img src={ellipse5Url} alt="" class="ellipse ellipse--5" />
                    <div class="quality-content quality-content--wide">
                        <p class="quality-num">5.</p>
                        <p class="quality-text">A team player with a selfless mindset</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recruitment Process Section -->
        <div class="process-section">
            <div class="process-title-wrap">
                <h2 class="section-title">Recruitment Process</h2>
            </div>
            <div class="process-box">
                <div class="process-steps">
                    <div class="process-step">
                        <img src={iconFileEdit} alt="" class="process-icon" />
                        <div class="process-label">
                            <p>Application</p>
                            <p>Submission</p>
                        </div>
                    </div>
                    <div class="process-arrow">
                        <img src={iconPolygon} alt="" class="arrow-icon" />
                    </div>
                    <div class="process-step">
                        <img src={iconFileSearch} alt="" class="process-icon" />
                        <div class="process-label">
                            <p>Resume</p>
                            <p>Screening</p>
                        </div>
                    </div>
                    <div class="process-arrow">
                        <img src={iconPolygon} alt="" class="arrow-icon" />
                    </div>
                    <div class="process-step">
                        <img src={iconMessage} alt="" class="process-icon" />
                        <div class="process-label">
                            <p>Interview</p>
                            <p class="process-label-sub">(Team / Executive)</p>
                        </div>
                    </div>
                    <div class="process-arrow">
                        <img src={iconPolygon} alt="" class="arrow-icon" />
                    </div>
                    <div class="process-step">
                        <img src={iconHourglass} alt="" class="process-icon" />
                        <div class="process-label">
                            <p>Offer</p>
                            <p>Discussion</p>
                        </div>
                    </div>
                    <div class="process-arrow">
                        <img src={iconPolygon} alt="" class="arrow-icon" />
                    </div>
                    <div class="process-step">
                        <img src={iconThumbUp} alt="" class="process-icon" />
                        <div class="process-label">
                            <p>Final</p>
                            <p>Acceptance</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="process-note">
                <p>This is the first step toward growing with DAEUnextier.<br/>
                We carefully review each candidate's experience and potential.</p>
            </div>
        </div>

        <!-- Open Positions Section -->
        <div class="positions-section">
            <h2 class="section-title section-title--center">Open Positions</h2>
            <div class="positions-grid">
                <template for:each={positions} for:item="pos">
                    <div key={pos.id} class="position-card">
                        <div class="position-header">
                            <span class="position-title">{pos.title}</span>
                            <span class="position-badge">{pos.badge}</span>
                        </div>
                        <div class="position-fields">
                            <template for:each={pos.fields} for:item="field">
                                <div key={field.label} class="position-field">
                                    <span class="field-label">{field.label}</span>
                                    <span class="field-value">{field.value}</span>
                                </div>
                            </template>
                        </div>
                        <div class="position-desc-section">
                            <p class="desc-heading">Job Description</p>
                            <div class="desc-box">
                                <p>{pos.description}</p>
                            </div>
                        </div>
                        <button class="apply-btn" type="button" aria-label="Apply Now">
                            <span>APPLY NOW</span>
                            <img src={iconArrow} alt="" class="btn-arrow" />
                        </button>
                    </div>
                </template>
            </div>
        </div>

    </div>
</template>
