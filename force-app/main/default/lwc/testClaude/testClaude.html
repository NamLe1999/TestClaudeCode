<template>
    <div class="job-section">
        <template for:each={jobsWithMeta} for:item="job">
            <article key={job.id} class={job.cardClass}>

                <!-- Header -->
                <button class="job-card__header"
                        data-job-id={job.id}
                        aria-expanded={job.isExpanded}
                        aria-label={job.title}
                        onclick={handleToggle}>
                    <div class="job-card__header-left">
                        <span class="job-card__status-dot" aria-hidden="true"></span>
                        <h2 class="job-card__title">{job.title}</h2>
                    </div>
                    <span class={job.chevronClass} aria-hidden="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 15L12 9L18 15"/>
                        </svg>
                    </span>
                </button>

                <!-- Expandable Body -->
                <template lwc:if={job.isExpanded}>
                    <div class="job-card__body">

                        <!-- Info Panels -->
                        <div class="job-card__info-list">

                            <!-- Key Responsibilities -->
                            <div class="job-card__info-panel">
                                <div class="job-card__icon-wrap" aria-hidden="true">
                                    <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#050505" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="6" width="18" height="24" rx="2"/>
                                        <path d="M14 6V5a1 1 0 011-1h6a1 1 0 011 1v1"/>
                                        <line x1="13" y1="14" x2="23" y2="14"/>
                                        <line x1="13" y1="19" x2="23" y2="19"/>
                                        <line x1="13" y1="24" x2="19" y2="24"/>
                                    </svg>
                                </div>
                                <div class="job-card__info-content">
                                    <h3 class="job-card__info-title">Key Responsibilities</h3>
                                    <div class="job-card__lists-row">
                                        <ul class="job-card__list">
                                            <template for:each={job.responsibilities} for:item="item">
                                                <li key={item.id} class="job-card__list-item">{item.text}</li>
                                            </template>
                                        </ul>
                                        <template lwc:if={job.hasResponsibilitiesCol2}>
                                            <ul class="job-card__list">
                                                <template for:each={job.responsibilitiesCol2} for:item="item">
                                                    <li key={item.id} class="job-card__list-item">{item.text}</li>
                                                </template>
                                            </ul>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Qualifications (only if present) -->
                            <template lwc:if={job.hasQualifications}>
                                <div class="job-card__info-panel">
                                    <div class="job-card__icon-wrap" aria-hidden="true">
                                        <svg width="28" height="28" viewBox="0 0 36 36" fill="none" stroke="#050505" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="5" y="5" width="11" height="11" rx="1.5"/>
                                            <rect x="20" y="5" width="11" height="11" rx="1.5"/>
                                            <rect x="5" y="20" width="11" height="11" rx="1.5"/>
                                            <rect x="20" y="20" width="11" height="11" rx="1.5"/>
                                        </svg>
                                    </div>
                                    <div class="job-card__info-content">
                                        <h3 class="job-card__info-title">Qualifications</h3>
                                        <ul class="job-card__list">
                                            <template for:each={job.qualifications} for:item="item">
                                                <li key={item.id} class="job-card__list-item">{item.text}</li>
                                            </template>
                                        </ul>
                                    </div>
                                </div>
                            </template>

                        </div>

                        <!-- Action Buttons -->
                        <div class="job-card__actions">
                            <button class="job-card__btn job-card__btn--ghost"
                                    data-job-id={job.id}
                                    onclick={handleViewInterview}>
                                <span>직무 인터뷰 보기</span>
                                <span class="job-card__btn-arrow job-card__btn-arrow--white" aria-hidden="true"></span>
                            </button>
                            <button class="job-card__btn job-card__btn--outlined"
                                    data-job-id={job.id}
                                    onclick={handleViewInterview}>
                                <span>직무 인터뷰 보기</span>
                                <span class="job-card__btn-arrow job-card__btn-arrow--blue" aria-hidden="true"></span>
                            </button>
                            <button class="job-card__btn job-card__btn--filled"
                                    data-job-id={job.id}
                                    onclick={handleApply}>
                                <span>직무 지원하기</span>
                                <span class="job-card__btn-arrow job-card__btn-arrow--white" aria-hidden="true"></span>
                            </button>
                        </div>

                    </div>
                </template>

            </article>
        </template>
    </div>
</template>
