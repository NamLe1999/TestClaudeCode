<template>
    <div class="badge-container">
        <div class="badge-header">
            <div class="badge-avatar">
                <span class="badge-initials">{initials}</span>
            </div>
            <div class="badge-title">
                <h1 class="badge-name">{name}</h1>
                <p class="badge-job">{job}</p>
            </div>
        </div>
        <div class="badge-divider"></div>
        <div class="badge-info">
            <div class="badge-info-row">
                <span class="badge-info-label">Date of Birth</span>
                <span class="badge-info-value">{dateOfBirth}</span>
            </div>
            <div class="badge-info-row">
                <span class="badge-info-label">Age</span>
                <span class="badge-info-value">{age}</span>
            </div>
            <div class="badge-info-row">
                <span class="badge-info-label">Job</span>
                <span class="badge-info-value">{job}</span>
            </div>
            <div class="badge-info-row">
                <span class="badge-info-label">Company</span>
                <span class="badge-info-value">{company}</span>
            </div>
        </div>
    </div>
</template>
